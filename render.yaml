services:
  - type: web
    name: thai-house-coin
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: thc-db
          property: connectionString

databases:
  - name: thc-db
    plan: free
